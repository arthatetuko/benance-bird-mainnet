<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Benance Bird</title>
  <link rel="stylesheet" href="/src/style.css">

  <!-- Basic Meta -->
  <meta name="title" content="Benance Bird - Play & Earn LUNC">
  <meta name="description" content="Play simple game. Earn and Burn more LUNC">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://benance-bird-mainnet.vercel.app/">
  <meta property="og:title" content="Benance Bird - Play, Earn & Burn LUNC">
  <meta property="og:description" content="Play simple game. Earn and Burn more LUNC">
  <meta property="og:image" content="https://benance-bird-mainnet.vercel.app/preview.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://benance-bird-mainnet.vercel.app/">
  <meta property="twitter:title" content="Benance Bird - Play, Earn & Burn LUNC">
  <meta property="twitter:description" content="Play simple game. Earn and Burn more LUNC.">
  <meta property="twitter:image" content="https://benance-bird-mainnet.vercel.app/preview.png">
</head>

<body>

  <!-- ===== HUD (WALLET + SCORE) ===== -->
  <div id="hud">
    <button id="connectBtn">Connect Wallet</button>

    <div id="walletInfo" style="display:none;">
      <p id="walletStatus"></p>
      <p>Score: <span id="score">0</span></p>
      <p>Highscore: <span id="highscore">0</span></p>
      <button id="disconnectBtn">Disconnect</button>
    </div>
  </div>

  <!-- ===== LEADERBOARD ===== -->
  <div id="leaderboardBox" style="display:none;"></div>

  <!-- ===== GAME CANVAS ===== -->
  <canvas id="gameCanvas"></canvas>

  <!-- ===== GAME OVER ACTIONS (CLAIM + BURN) ===== -->
  <div id="gameOverActions" style="display:none;">
    <button id="claimBtn">Claim LUNC</button>
    <button id="burnBtn">🔥 Burn LUNC</button>
  </div>

  <!-- ===== TREASURY POPUP ===== -->
  <div id="treasuryBox" style="display:none;">
    <h3>Treasury Info</h3>

    <p>💰 Treasury Balance:
      <span id="treasuryBalance">0</span>
    </p>

    <p>📤 Total Distribution:
      <span id="totalDistribution">0</span>
    </p>

    <p>🔥 Total Burn:
      <span id="totalBurn">0</span>
    </p>

    <p>⚡️ Available Today:
      <span id="availableToday">0</span>
    </p>

    <div id="donateSection">
      <input id="donateAmount" type="number" placeholder="Amount LUNC" />
      <button id="donateBtn">Donate</button>
    </div>

    <button id="refreshTreasury">🔄 Refresh</button>
    <button onclick="
      document.getElementById('treasuryBox').style.display='none';
    ">
      Close
    </button>
  </div>

  <script type="module" src="/src/main.js"></script>

</body>
</html>
